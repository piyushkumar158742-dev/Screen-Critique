<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Critique</title>
    <style>
        :root {
            --primary-bg: #041C23;
            --secondary-bg: #0A3641;
            --accent-color: #21E6C1;
            --text-light: #E8F9FD;
            --text-muted: #7FA9B5;
            --completed-color: #4CAF50;
            --watching-color: #FF9800;
            --planned-color: #2196F3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--primary-bg); color: var(--text-light); overflow-x: hidden; }

        .navbar {
            position: sticky; top: 0; background-color: rgba(4, 28, 35, 0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-between;
            align-items: center; padding: 1rem 2rem; border-bottom: 2px solid var(--accent-color);
            z-index: 1000; flex-wrap: wrap; gap: 1rem;
        }

        .logo { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: bold; color: var(--accent-color); cursor: pointer; transition: all 0.3s ease; }
        .logo:hover { transform: scale(1.05); text-shadow: 0 0 15px var(--accent-color); }

        .menu-toggle { display: none; font-size: 2rem; color: var(--accent-color); cursor: pointer; padding: 0 10px; font-weight: bold; }

        .nav-links { list-style: none; display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
        .nav-links li { cursor: pointer; font-weight: 500; transition: all 0.3s ease; padding: 5px 0; position: relative; }
        .nav-links li:hover { color: var(--accent-color); transform: translateY(-2px); }
        .nav-links li.active { color: var(--accent-color); text-shadow: 0 0 8px rgba(33, 230, 193, 0.6); }
        .nav-links li.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }

        .search-container { position: relative; flex-grow: 1; max-width: 400px; }
        #search-box { padding: 0.6rem 1rem; width: 100%; border-radius: 20px; border: 1px solid var(--accent-color); background-color: var(--secondary-bg); color: var(--text-light); outline: none; transition: box-shadow 0.3s ease; }
        #search-box:focus { box-shadow: 0 0 10px rgba(33, 230, 193, 0.5); }

        .main-content { padding: 2rem; }
        .section-title { margin-bottom: 1.5rem; color: var(--accent-color); border-left: 4px solid var(--accent-color); padding-left: 10px; text-transform: capitalize; }
        .hidden { display: none !important; }

        .hero-picks { display: flex; gap: 2rem; height: 45vh; margin-bottom: 3rem; }
        .hero-card { flex: 1; border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; transition: transform 0.3s; border: 1px solid var(--secondary-bg); display: flex; justify-content: center; align-items: center; background-color: #000; }
        .hero-card:hover { transform: scale(1.02); border-color: var(--accent-color); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .hero-bg { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; object-fit: cover; filter: blur(25px) opacity(0.4); z-index: 1; }
        .hero-poster { height: 95%; width: auto; max-width: 100%; object-fit: contain; z-index: 2; box-shadow: 0 0 20px rgba(0,0,0,0.8); border-radius: 8px; }
        .hero-info { position: absolute; bottom: 0; left: 0; padding: 2rem 1.5rem 1.5rem; background: linear-gradient(transparent, rgba(0,0,0,0.95)); width: 100%; z-index: 3; text-align: center; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
        .movie-grid.pick-layout, .tracker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; max-width: 1200px; margin: 0 auto 2rem; }

        .movie-card { background-color: var(--secondary-bg); border-radius: 8px; cursor: pointer; transition: all 0.3s ease; text-align: center; padding-bottom: 10px; position: relative; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid transparent;}
        .movie-card:hover { transform: translateY(-8px); border-color: var(--accent-color); box-shadow: 0 10px 15px rgba(0,0,0,0.6); }
        .movie-card img { width: 100%; height: 280px; object-fit: cover; border-top-left-radius: 8px; border-top-right-radius: 8px; background-color: #000; }
        .movie-card h3 { font-size: 1rem; padding: 10px 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .rank-badge { position: absolute; top: -10px; left: -10px; background: var(--accent-color); color: var(--primary-bg); font-weight: bold; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; border-radius: 50%; z-index: 5; font-size: 1.1rem; border: 2px solid var(--primary-bg); box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .loading-trigger { height: 60px; display: flex; justify-content: center; align-items: center; color: var(--accent-color); font-weight: bold; margin-top: 2rem; }

        /* ================= TRACKER UI SPECIFICS ================= */
        .tracker-section { margin-bottom: 3rem; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 10px;}
        .tracker-section h2 { border-bottom: 2px solid; padding-bottom: 10px; margin-bottom: 20px;}
        #sec-watching h2 { color: var(--watching-color); border-color: var(--watching-color); }
        #sec-planned h2 { color: var(--planned-color); border-color: var(--planned-color); }
        #sec-completed h2 { color: var(--completed-color); border-color: var(--completed-color); }
        
        .remove-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: #ff4d4d; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; cursor: pointer; z-index: 10; transition: 0.2s;}
        .remove-btn:hover { background: #ff4d4d; color: white; transform: scale(1.1); }

        .ep-controls { display: flex; justify-content: center; align-items: center; gap: 5px; margin-top: 10px; padding: 0 5px; }
        .ep-btn { background: var(--primary-bg); color: var(--text-light); border: 1px solid var(--accent-color); border-radius: 4px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; transition: 0.2s;}
        .ep-btn:hover { background: var(--accent-color); color: var(--primary-bg); }
        .ep-input { width: 45px; height: 30px; text-align: center; background: var(--primary-bg); color: var(--text-light); border: 1px solid var(--text-muted); border-radius: 4px; outline: none; font-weight: bold;}
        .ep-total { color: var(--text-muted); font-size: 0.9rem; margin-left: 5px;}
        .tracker-empty { grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 2rem; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background-color: var(--primary-bg); border-radius: 10px; width: 95%; max-width: 1000px; max-height: 90vh; position: relative; border: 1px solid var(--accent-color); display: flex; flex-direction: column; overflow: hidden; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; color: var(--accent-color); cursor: pointer; z-index: 100; transition: transform 0.2s; background: var(--primary-bg); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .close-btn:hover { transform: scale(1.2); }
        .modal-body { display: flex; gap: 2rem; flex-wrap: wrap; padding: 2.5rem 2rem 2rem; overflow-y: auto; max-height: 90vh; flex-direction: row; }
        
        .modal-poster-col { display: flex; flex-direction: column; gap: 10px; width: 300px; }
        .modal-poster { width: 100%; height: auto; max-height: 450px; object-fit: contain; border-radius: 8px; }

        .action-buttons { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 10px;}
        .action-btn { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: all 0.2s; color: white; opacity: 0.6; font-size: 1rem; }
        .action-btn:hover:not(:disabled) { opacity: 1; transform: translateY(-2px); }
        .action-btn.active { opacity: 1; border: 2px solid white; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .action-btn:disabled { background: #333 !important; color: #777; cursor: not-allowed; opacity: 0.5; }
        
        .btn-watching { background-color: var(--watching-color); }
        .btn-planned { background-color: var(--planned-color); }
        .btn-completed { background-color: var(--completed-color); }

        .modal-details { flex: 1; min-width: 250px; }
        .modal-details h2 { color: var(--accent-color); margin-bottom: 10px; font-size: 2rem; padding-right: 40px; }
        .modal-details p { margin-bottom: 8px; line-height: 1.6; color: var(--text-light); }
        .read-more-btn { color: var(--accent-color); cursor: pointer; font-weight: bold; margin-left: 5px; }
        .read-more-btn:hover { text-decoration: underline; }
        .trailer-container { margin-top: 20px; width: 100%; aspect-ratio: 16 / 9; }
        .trailer-container iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }

        @media (max-width: 1000px) { 
            .movie-grid.pick-layout, .tracker-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } 
        }
        
        @media (max-width: 768px) {
            .navbar { flex-direction: row; justify-content: space-between; align-items: center; padding: 1rem; }
            .menu-toggle { display: block; }
            .search-container { order: 3; width: 100%; max-width: 100%; margin-top: 10px; }
            .nav-links { display: none; flex-direction: column; width: 100%; order: 4; background: var(--primary-bg); position: absolute; top: 100%; left: 0; padding: 1rem 0; border-bottom: 2px solid var(--accent-color); z-index: 1001; }
            .nav-links.show-nav { display: flex; }
            .nav-links li { width: 100%; text-align: center; padding: 15px 0; }
            .hero-picks { flex-direction: column; height: auto; }
            .hero-card { height: 350px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .movie-card img { height: 220px; }
            
            .modal-content { max-width: 95vw; }
            .modal-body { flex-direction: column !important; align-items: center; text-align: center; padding: 4rem 1rem 1rem !important; }
            .modal-poster-col { width: 100%; max-width: 250px; }
            .modal-details { width: 100%; min-width: 0; }
            .modal-details h2 { padding-right: 0; font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" id="site-logo">Otaku Critique</div>
        <div class="menu-toggle" id="mobile-menu-btn">⋮</div>
        <ul class="nav-links" id="nav-list">
            <li data-category="home" class="active">Home</li>
            <li data-category="upcoming">Upcoming</li>
            <li data-category="underrated">Underrated</li>
            <li data-category="pick">Today's Pick</li>
            <li data-category="mylist" style="color: #FFC107; font-weight: bold;">My List</li>
        </ul>
        <div class="search-container">
            <input type="text" id="search-box" placeholder="Search Anime... (e.g. Naruto)" autocomplete="off">
        </div>
    </nav>

    <main class="main-content">
        <div id="hero-container">
            <section class="hero-picks" id="hero-picks"></section>
        </div>

        <section class="dynamic-movies">
            <h2 class="section-title" id="grid-title">Loading...</h2>
            
            <div class="movie-grid" id="main-grid"></div>
            
            <div id="my-list-container" class="hidden">
                <div class="tracker-section" id="sec-watching">
                    <h2>▶ Watching</h2>
                    <div class="tracker-grid" id="grid-watching"></div>
                </div>
                <div class="tracker-section" id="sec-planned">
                    <h2>🗓 Going to Watch</h2>
                    <div class="tracker-grid" id="grid-planned"></div>
                </div>
                <div class="tracker-section" id="sec-completed">
                    <h2>✔ Completed</h2>
                    <div class="tracker-grid" id="grid-completed"></div>
                </div>
            </div>

            <div class="loading-trigger hidden" id="loading-trigger">Scrolling for more...</div>
        </section>
    </main>

    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.jikan.moe/v4';

        // ================= DATABASE =================
        let otakuDatabase = JSON.parse(localStorage.getItem('otakuTracker')) || {};
        let currentActiveAnime = null;

        function saveDatabase() { localStorage.setItem('otakuTracker', JSON.stringify(otakuDatabase)); }

        // ================= BANNER LOGIC =================
        // Permanently ban 'Steel Ball Run' from showing up anywhere
        function isBanned(anime) {
            const title = (anime.title_english || anime.title || '').toLowerCase();
            return title.includes('steel ball run');
        }

        const DOM = {
            logo: document.getElementById('site-logo'),
            mobileBtn: document.getElementById('mobile-menu-btn'),
            navList: document.getElementById('nav-list'),
            searchBox: document.getElementById('search-box'),
            mainGrid: document.getElementById('main-grid'),
            myListContainer: document.getElementById('my-list-container'),
            gridTitle: document.getElementById('grid-title'),
            heroContainer: document.getElementById('hero-container'),
            heroPicks: document.getElementById('hero-picks'),
            loadingTrigger: document.getElementById('loading-trigger'),
            modal: document.getElementById('movie-modal'),
            modalBody: document.getElementById('modal-body'),
            navItems: document.querySelectorAll('#nav-list li')
        };

        let currentCategory = 'home';
        let currentPage = 1;
        let isFetching = false;
        let infiniteScrollEnabled = true;

        document.addEventListener('DOMContentLoaded', () => {
            loadHeroPicks();
            loadCategory('home', true);
            setupIntersectionObserver();
        });

        DOM.mobileBtn.addEventListener('click', () => DOM.navList.classList.toggle('show-nav'));

        function setActiveTab(category) {
            DOM.navItems.forEach(item => {
                if (item.getAttribute('data-category') === category) item.classList.add('active');
                else item.classList.remove('active');
            });
        }

        DOM.logo.addEventListener('click', () => {
            DOM.heroContainer.classList.remove('hidden');
            setActiveTab('home');
            loadCategory('home', true);
            DOM.navList.classList.remove('show-nav'); 
        });

        DOM.navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                DOM.heroContainer.classList.add('hidden');
                const cat = e.target.getAttribute('data-category');
                setActiveTab(cat);
                
                if (cat === 'mylist') loadMyListDashboard();
                else loadCategory(cat, true);
                
                DOM.navList.classList.remove('show-nav'); 
            });
        });

        DOM.searchBox.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && DOM.searchBox.value.trim()) {
                DOM.heroContainer.classList.add('hidden');
                setActiveTab('');
                DOM.mainGrid.classList.remove('hidden');
                DOM.myListContainer.classList.add('hidden');
                
                const query = DOM.searchBox.value.trim();
                DOM.gridTitle.innerText = `Search Results: ${query}`;
                currentCategory = 'search';
                infiniteScrollEnabled = false;
                DOM.loadingTrigger.classList.add('hidden');
                DOM.navList.classList.remove('show-nav');
                DOM.mainGrid.innerHTML = '<h2>Loading...</h2>';
                DOM.mainGrid.classList.remove('pick-layout');
                
                const res = await fetch(`${API_BASE}/anime?q=${encodeURIComponent(query)}&sfw=true`);
                const data = await res.json();
                
                // Filter out broken trailers, images, and banned animes
                const validAnimes = data.data.filter(a => a.images.jpg.large_image_url && a.trailer.embed_url && !isBanned(a));
                renderGrid(validAnimes, false, true);
            }
        });

        async function loadHeroPicks() {
            try {
                const res = await fetch(`${API_BASE}/top/anime?limit=25`);
                const data = await res.json();
                const valid = data.data.filter(a => a.images.jpg.large_image_url && a.trailer.embed_url && !isBanned(a));
                valid.sort(() => 0.5 - Math.random());
                const topTwo = valid.slice(0, 2);
                
                DOM.heroPicks.innerHTML = '';
                topTwo.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'hero-card';
                    card.onclick = () => openModal(anime);
                    const poster = anime.images.jpg.large_image_url;
                    card.innerHTML = `<img src="${poster}" class="hero-bg"><img src="${poster}" class="hero-poster"><div class="hero-info"><h2>${anime.title_english || anime.title}</h2><p style="color: var(--accent-color); font-weight: bold; margin-top: 5px;">★ ${anime.score || 'N/A'}/10</p></div>`;
                    DOM.heroPicks.appendChild(card);
                });
            } catch(e) {}
        }

        async function loadCategory(catKey, isNewCategory = false) {
            if(isFetching) return;
            isFetching = true;

            DOM.mainGrid.classList.remove('hidden');
            DOM.myListContainer.classList.add('hidden');

            if (isNewCategory) {
                currentCategory = catKey;
                currentPage = 1;
                DOM.mainGrid.innerHTML = '';
                infiniteScrollEnabled = (catKey !== 'pick'); 
                if (infiniteScrollEnabled) DOM.loadingTrigger.classList.remove('hidden');
                else DOM.loadingTrigger.classList.add('hidden');

                if (catKey === 'pick') DOM.mainGrid.classList.add('pick-layout');
                else DOM.mainGrid.classList.remove('pick-layout');
            }

            let animes = [];
            let isRankedPick = false;

            try {
                if (catKey === 'home') {
                    DOM.gridTitle.innerText = "Masterpieces & Hidden Gems";
                    const [mastRes, gemRes] = await Promise.all([
                        fetch(`${API_BASE}/top/anime?page=${currentPage}`), 
                        fetch(`${API_BASE}/anime?order_by=score&sort=desc&page=${currentPage + 20}`)
                    ]);
                    const mastData = await mastRes.json();
                    const gemData = await gemRes.json();

                    const maxLength = Math.max(mastData.data.length, gemData.data.length);
                    for(let i=0; i<maxLength; i++) {
                        if(mastData.data[i] && !isBanned(mastData.data[i])) animes.push(mastData.data[i]);
                        if(gemData.data[i] && !isBanned(gemData.data[i])) animes.push(gemData.data[i]);
                    }
                    if (!mastData.pagination.has_next_page) infiniteScrollEnabled = false;
                } 
                else if (catKey === 'underrated') {
                    DOM.gridTitle.innerText = "Hidden Gems & Underrated Masterpieces";
                    const res = await fetch(`${API_BASE}/anime?order_by=score&sort=desc&page=${currentPage + 20}`);
                    const data = await res.json();
                    animes = data.data.filter(a => !isBanned(a));
                    if (!data.pagination.has_next_page) infiniteScrollEnabled = false;
                }
                else if (catKey === 'upcoming') {
                    DOM.gridTitle.innerText = "Highly Hyped Upcoming Anime";
                    const res = await fetch(`${API_BASE}/top/anime?filter=upcoming&page=${currentPage}`);
                    const data = await res.json();
                    animes = data.data.filter(a => !isBanned(a));
                    if (!data.pagination.has_next_page) infiniteScrollEnabled = false;
                } 
                else if (catKey === 'pick') {
                    DOM.gridTitle.innerText = "Today's Top 10 Picks";
                    const res = await fetch(`${API_BASE}/top/anime?filter=favorite&limit=25`);
                    const data = await res.json();
                    let validAnimes = data.data.filter(a => a.images.jpg.large_image_url && a.trailer.embed_url && !isBanned(a));
                    const dayOfMonth = new Date().getDate(); 
                    const startIdx = dayOfMonth % validAnimes.length; 
                    animes = validAnimes.concat(validAnimes).slice(startIdx, startIdx + 10);
                    isRankedPick = true;
                }

                if (catKey !== 'pick') animes = animes.filter(a => a.images.jpg.large_image_url && a.trailer.embed_url);
                renderGrid(animes, isRankedPick, isNewCategory);
                
                if (!infiniteScrollEnabled) DOM.loadingTrigger.classList.add('hidden');

            } catch (error) { console.error(error);
            } finally {
                isFetching = false;
                if (infiniteScrollEnabled && isTriggerVisible()) {
                    setTimeout(() => { currentPage++; loadCategory(currentCategory, false); }, 500); 
                }
            }
        }

        function isTriggerVisible() {
            const rect = DOM.loadingTrigger.getBoundingClientRect();
            return (rect.top >= 0 && rect.top <= window.innerHeight);
        }

        function renderGrid(animes, isRankedPick, isNewCategory) {
            if (isNewCategory && animes.length === 0) {
                DOM.mainGrid.innerHTML = '<p style="width:100%;grid-column:1/-1;text-align:center;">No results found.</p>';
                return;
            }
            animes.forEach((anime, index) => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openModal(anime); 
                let badgeHTML = isRankedPick ? `<div class="rank-badge">${index + 1}</div>` : '';
                card.innerHTML = `${badgeHTML}<img src="${anime.images.jpg.large_image_url}" loading="lazy"><h3>${anime.title_english || anime.title}</h3>`;
                DOM.mainGrid.appendChild(card);
            });
        }

        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && infiniteScrollEnabled && !isFetching) {
                    currentPage++; loadCategory(currentCategory, false);
                }
            }, { rootMargin: '300px' }); 
            observer.observe(DOM.loadingTrigger);
        }

        // ================= TRACKER DASHBOARD (MY LIST) =================
        function loadMyListDashboard() {
            currentCategory = 'mylist';
            infiniteScrollEnabled = false;
            DOM.loadingTrigger.classList.add('hidden');
            DOM.mainGrid.classList.add('hidden');
            DOM.myListContainer.classList.remove('hidden');
            DOM.gridTitle.innerText = "My Personal Tracker";

            const gridWatching = document.getElementById('grid-watching');
            const gridPlanned = document.getElementById('grid-planned');
            const gridCompleted = document.getElementById('grid-completed');

            gridWatching.innerHTML = ''; gridPlanned.innerHTML = ''; gridCompleted.innerHTML = '';

            Object.values(otakuDatabase).forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                
                const title = item.title;
                const total = item.totalEpisodes || '?';
                const maxHtml = item.totalEpisodes ? `max="${item.totalEpisodes}"` : '';
                
                let controlsHTML = '';
                // Only show episode controls if it is in Watching AND it is NOT a movie
                if(item.status === 'watching' && item.type !== 'Movie') {
                    controlsHTML = `
                        <div class="ep-controls" onclick="event.stopPropagation()">
                            <button class="ep-btn" onclick="changeEp(${item.id}, -1)">-</button>
                            <input class="ep-input" type="number" value="${item.progress}" ${maxHtml} onchange="setEp(${item.id}, this.value)" min="1">
                            <button class="ep-btn" onclick="changeEp(${item.id}, 1)">+</button>
                            <span class="ep-total">/ ${total}</span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <span class="remove-btn" onclick="event.stopPropagation(); removeFromList(${item.id})">×</span>
                    <img src="${item.poster}" onclick="openFromDatabase(${item.id})">
                    <h3 onclick="openFromDatabase(${item.id})">${title}</h3>
                    ${controlsHTML}
                `;

                if(item.status === 'watching') gridWatching.appendChild(card);
                else if(item.status === 'planned') gridPlanned.appendChild(card);
                else if(item.status === 'completed') gridCompleted.appendChild(card);
            });

            if(!gridWatching.innerHTML) gridWatching.innerHTML = '<div class="tracker-empty">No anime added yet.</div>';
            if(!gridPlanned.innerHTML) gridPlanned.innerHTML = '<div class="tracker-empty">No anime added yet.</div>';
            if(!gridCompleted.innerHTML) gridCompleted.innerHTML = '<div class="tracker-empty">No anime added yet.</div>';
        }

        window.openFromDatabase = async function(id) {
            try {
                const res = await fetch(`${API_BASE}/anime/${id}`);
                const data = await res.json();
                openModal(data.data);
            } catch(e) { alert("Failed to load details."); }
        }

        window.changeEp = function(id, delta) {
            const entry = otakuDatabase[id];
            if(!entry) return;
            let newVal = parseInt(entry.progress) + delta;
            updateEpData(id, newVal);
        }

        window.setEp = function(id, val) {
            updateEpData(id, parseInt(val) || 1);
        }

        // The Strict Episode Cap Logic
        function updateEpData(id, val) {
            const entry = otakuDatabase[id];
            
            // Hard limit: Can never drop below 1
            if(val < 1) val = 1; 
            
            // Limit based on known episodes
            if(entry.totalEpisodes && val >= entry.totalEpisodes) {
                val = entry.totalEpisodes; // Cap the value
                
                // ONLY move to completed if the anime has actually finished airing in real life
                if(entry.airingStatus === 'Finished Airing') {
                    entry.status = 'completed'; 
                }
            }
            
            entry.progress = val;
            saveDatabase();
            loadMyListDashboard(); 
        }

        window.removeFromList = function(id) {
            delete otakuDatabase[id];
            saveDatabase();
            loadMyListDashboard();
        }

        function updateListStatus(status) {
            const anime = currentActiveAnime;
            if(!anime) return;
            
            // Constraint: Cannot add uncompleted shows to completed
            const canComplete = anime.status === 'Finished Airing';
            if (status === 'completed' && !canComplete) {
                alert("This anime has not finished airing yet! You cannot mark it as completed.");
                return;
            }

            // Constraint: Cannot add upcoming to watching
            const isUpcoming = (anime.status === 'Not yet aired' || anime.status === 'Upcoming');
            if (isUpcoming && status === 'watching') {
                return; 
            }

            otakuDatabase[anime.mal_id] = {
                id: anime.mal_id,
                title: anime.title_english || anime.title,
                poster: anime.images.jpg.large_image_url,
                totalEpisodes: anime.episodes,
                type: anime.type,
                airingStatus: anime.status, // Save to check later
                status: status,
                progress: otakuDatabase[anime.mal_id]?.progress || 1 // Defaults to 1
            };
            
            if(status === 'completed' && anime.episodes) otakuDatabase[anime.mal_id].progress = anime.episodes;

            saveDatabase();
            refreshModalButtons(anime.mal_id);
            if(currentCategory === 'mylist') loadMyListDashboard();
        }

        function refreshModalButtons(id) {
            const dbData = otakuDatabase[id];
            const btnW = document.getElementById('btn-watching');
            const btnP = document.getElementById('btn-planned');
            const btnC = document.getElementById('btn-completed');
            
            if(btnW) btnW.className = `action-btn btn-watching ${dbData?.status === 'watching' ? 'active' : ''}`;
            if(btnP) btnP.className = `action-btn btn-planned ${dbData?.status === 'planned' ? 'active' : ''}`;
            if(btnC) btnC.className = `action-btn btn-completed ${dbData?.status === 'completed' ? 'active' : ''}`;
        }

        window.toggleSynopsis = function(btn) {
            const contentSpan = btn.previousElementSibling;
            if (btn.innerText === 'Read More') { contentSpan.innerText = contentSpan.getAttribute('data-full'); btn.innerText = ' Show Less'; } 
            else { contentSpan.innerText = contentSpan.getAttribute('data-full').substring(0, 200) + '...'; btn.innerText = ' Read More'; }
        };

        function openModal(anime) {
            if(!anime.genres) {
                 fetch(`${API_BASE}/anime/${anime.mal_id}`).then(r=>r.json()).then(data => openModal(data.data));
                 return;
            }

            currentActiveAnime = anime;
            const title = anime.title_english || anime.title;
            const genres = anime.genres ? anime.genres.map(g => g.name).join(', ') : 'N/A';
            const studios = anime.studios ? anime.studios.map(s => s.name).join(', ') : 'N/A';
            
            // Airing Status Logic
            const isUpcoming = (anime.status === 'Not yet aired' || anime.status === 'Upcoming');
            const canComplete = (anime.status === 'Finished Airing');
            const isMovie = (anime.type === 'Movie');
            
            const fullSynopsis = anime.synopsis || 'No synopsis available.';
            let shortSynopsis = fullSynopsis;
            let readMoreHTML = '';
            if (fullSynopsis.length > 200) {
                shortSynopsis = fullSynopsis.substring(0, 200) + '...';
                readMoreHTML = `<span class="read-more-btn" onclick="toggleSynopsis(this)">Read More</span>`;
            }
            const safeSynopsis = fullSynopsis.replace(/"/g, '&quot;').replace(/'/g, '&#39;');

            // Generate Buttons with Strict Logic applied
            let actionButtonsHTML = '';
            if (isMovie) {
                actionButtonsHTML = `<button id="btn-completed" class="action-btn btn-completed" onclick="updateListStatus('completed')" ${!canComplete ? 'disabled title="Movie has not aired yet"' : ''}>✔ Completed</button>`;
            } else {
                actionButtonsHTML = `
                    <button id="btn-completed" class="action-btn btn-completed" onclick="updateListStatus('completed')" ${!canComplete ? 'disabled title="Anime has not finished airing"' : ''}>✔ Completed</button>
                    <button id="btn-watching" class="action-btn btn-watching" onclick="updateListStatus('watching')" ${isUpcoming ? 'disabled title="Not aired yet"' : ''}>▶ Watching</button>
                    <button id="btn-planned" class="action-btn btn-planned" onclick="updateListStatus('planned')">🗓 Going to Watch</button>
                `;
            }

            DOM.modalBody.innerHTML = `
                <div class="modal-poster-col">
                    <img src="${anime.images.jpg.large_image_url}" class="modal-poster">
                    <div class="action-buttons">
                        ${actionButtonsHTML}
                    </div>
                </div>
                <div class="modal-details">
                    <h2>${title}</h2>
                    <p><strong>Status:</strong> ${anime.status} (${anime.year || 'N/A'})</p>
                    <p><strong>Type:</strong> ${anime.type || 'N/A'}</p>
                    <p><strong>Episodes:</strong> ${anime.episodes || 'Unknown'}</p>
                    <p><strong>Studio:</strong> ${studios}</p>
                    <p><strong>Genres:</strong> ${genres}</p>
                    <p><strong>Score:</strong> ${anime.score || 'N/A'}/10</p>
                    <p><strong>Synopsis:</strong> 
                        <span class="synopsis-content" data-full="${safeSynopsis}">${shortSynopsis}</span>
                        ${readMoreHTML}
                    </p>
                    ${anime.trailer.embed_url ? `<div class="trailer-container"><iframe src="${anime.trailer.embed_url}" allowfullscreen></iframe></div>` : ''}
                </div>
            `;
            
            refreshModalButtons(anime.mal_id);
            DOM.modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            DOM.modalBody.scrollTop = 0; 
        }

        const closeAndStopVideo = () => { DOM.modal.style.display = 'none'; document.body.style.overflow = 'auto'; DOM.modalBody.innerHTML = ''; };
        document.getElementById('close-modal').onclick = closeAndStopVideo;
        window.onclick = (e) => { if (e.target === DOM.modal) closeAndStopVideo(); }
    </script>
</body>
</html>

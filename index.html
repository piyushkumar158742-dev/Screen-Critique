<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Photo Filter</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        /* CSS Reset to eliminate all rogue white lines and margins */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: none;
            outline: none;
        }

        body {
            background-color: #0f1115;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-wrapper {
            background-color: #1e2128;
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2a2d36;
            padding-bottom: 1rem;
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }

        /* Loading State Overlay */
        #processing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 33, 40, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            border-radius: 16px;
        }

        #processing-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .workspace {
            background-color: #000;
            border-radius: 8px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
            display: block;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        input[type="file"] {
            display: none;
        }

        button, .custom-file-upload {
            background-color: #6366f1;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-size: 1rem;
            text-align: center;
        }

        button:hover:not(:disabled), .custom-file-upload:hover {
            background-color: #4f46e5;
        }

        button:active:not(:disabled), .custom-file-upload:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #374151;
            color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header>
            <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
            <h1>Photo Filter Studio</h1>
        </header>

        <div id="processing-overlay">
            <div class="spinner"></div>
            <p>Applying Filter...</p>
        </div>

        <main>
            <div class="workspace">
                <canvas id="editor-canvas"></canvas>
            </div>

            <div class="toolbar">
                <label for="image-upload" class="custom-file-upload">
                    Upload Photo
                </label>
                <input type="file" id="image-upload" accept="image/*">
                
                <button id="apply-filter" disabled>Apply Filter</button>
                <button id="download-btn" disabled>Download</button>
            </div>
        </main>
    </div>
    
    <script>
        // DOM Elements
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const uploadInput = document.getElementById('image-upload');
        const applyBtn = document.getElementById('apply-filter');
        const downloadBtn = document.getElementById('download-btn');
        const processingOverlay = document.getElementById('processing-overlay');

        let currentImage = null;

        // Handle Image Upload
        uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Set canvas dimensions to match image
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // Draw image to canvas
                    ctx.drawImage(img, 0, 0);
                    currentImage = img;
                    
                    // Enable buttons
                    applyBtn.disabled = false;
                    downloadBtn.disabled = false;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Apply Pure JavaScript Filter
        applyBtn.addEventListener('click', () => {
            if (!currentImage) return;
            
            // Show processing UI
            processingOverlay.classList.add('visible');

            // Use a short timeout to let the browser render the overlay before freezing to process pixels
            setTimeout(() => {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                
                // Loop through every pixel (RGBA)
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];
                    
                    // Calculate grayscale luminance
                    let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                    
                    // Boost contrast slightly for a professional finish
                    let contrast = (gray - 128) * 1.2 + 128;
                    
                    // Clamp values between 0 and 255
                    contrast = Math.max(0, Math.min(255, contrast));
                    
                    // Reassign the modified values
                    data[i] = contrast;     // Red
                    data[i + 1] = contrast; // Green
                    data[i + 2] = contrast; // Blue
                    // data[i + 3] is Alpha, leave it unchanged
                }

                // Put the modified pixels back onto the canvas
                ctx.putImageData(imgData, 0, 0);

                // Hide processing UI
                processingOverlay.classList.remove('visible');
            }, 50);
        });

        // Handle Download
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'filtered-photo.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
